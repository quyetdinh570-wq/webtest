<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NapGame247</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Be Vietnam Pro',sans-serif;
}

body{
background:#efefef;
}

header{
background:linear-gradient(90deg,#6a11cb,#ff3c83);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
font-weight:800;
font-size:24px;
position:sticky;
top:0;
z-index:999;
}

.menu{
display:flex;
gap:30px;
font-weight:700;
font-size:18px;
}

.menu a{
color:#fff;
text-decoration:none;
}

.hero{
background:linear-gradient(180deg,#8b1db1,#ff3f86);
padding:70px 20px;
text-align:center;
color:#fff;
}

.hero h1{
font-size:70px;
font-weight:800;
margin-bottom:20px;
}

.hero p{
font-size:30px;
font-weight:600;
}

.banner{
width:100%;
overflow:hidden;
background:#fff;
}

.banner img{
width:100%;
display:block;
}

.info-box{
display:flex;
justify-content:center;
gap:30px;
margin-top:-40px;
position:relative;
z-index:5;
flex-wrap:wrap;
}

.info-item{
background:#ffe600;
padding:20px 35px;
font-size:32px;
font-weight:800;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.games{
padding:50px 20px;
max-width:1400px;
margin:auto;
}

.games h2{
font-size:45px;
margin-bottom:40px;
font-weight:800;
text-align:center;
}

.game-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
gap:35px;
}

.game-card{
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.12);
cursor:pointer;
transition:.3s;
}

.game-card:hover{
transform:translateY(-8px) scale(1.02);
}

.game-card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.game-name{
padding:25px;
font-size:42px;
font-weight:800;
text-align:center;
}

.ff{
color:#ff5b22;
}

.lq{
color:#287ae6;
}

.telegram{
position:fixed;
left:20px;
bottom:20px;
background:#fff;
padding:15px 20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
display:flex;
align-items:center;
gap:12px;
z-index:999;
text-decoration:none;
color:#000;
font-weight:700;
}

.telegram img{
width:45px;
}

footer{
margin-top:60px;
background:#7d1fa8;
padding:25px;
text-align:center;
color:#fff;
font-size:24px;
font-weight:700;
}

@media(max-width:768px){

.hero h1{
font-size:45px;
}

.hero p{
font-size:20px;
}

.game-name{
font-size:28px;
}

.info-item{
font-size:22px;
}

.game-list{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header>
<div>NAPGAME247</div>

<div class="menu">

</section>

<div class="banner">
<img src="https://naplau.com/master-images/slider/slider1.jpg">
</div>

<div class="info-box">
<div class="info-item">Bảo hành</div>
<div class="info-item">Tiện lợi</div>
<div class="info-item">Hỗ trợ 24/7</div>
</div>

<section class="games">

<div class="game-list">

<div class="game-card" onclick="location.href='ff.html'">

</div>

<div class="game-card" onclick="location.href='lq.html'">

</div>

</div>
</section>

</html>
