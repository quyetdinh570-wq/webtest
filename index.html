<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #071a38,
    #143574,
    #2954c8);
}

.login-box{
    width:460px;
    background:#fff;
    border-radius:35px;
    padding:45px;
    box-shadow:
    0 25px 70px rgba(0,0,0,.25);
}

/* LOGO */

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:15px;
}

.okvip-logo{
    display:flex;
    align-items:center;
    font-weight:900;
    font-size:62px;
}

.ok-icon{
    color:#f59e0b;
    font-size:58px;
    margin-right:6px;
}

.ok-box{
    background:#f59e0b;
    color:white;
    padding:0 12px;
    border-radius:4px;
    margin-right:4px;
    line-height:1.1;
}

.vip{
    color:#000;
}

/* TTKM */

.brand{
    text-align:center;
    font-size:52px;
    font-weight:900;
    letter-spacing:8px;
    color:#0f172a;
    margin-bottom:20px;
}

/* BADGE */

.badge{
    display:block;
    width:max-content;
    margin:auto;
    background:#dbeafe;
    color:#0369a1;
    padding:12px 22px;
    border-radius:999px;
    font-weight:700;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:17px;
    font-weight:700;
    color:#334155;
}

.input-group{
    margin-bottom:22px;
}

input{
    width:100%;
    padding:16px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:
    0 0 0 4px rgba(37,99,235,.15);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:900;
    color:white;
    cursor:pointer;

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #00c8ff);
}

button:hover{
    opacity:.95;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
}

@media(max-width:500px){

.login-box{
    width:92%;
    padding:30px;
}

.okvip-logo{
    font-size:46px;
}

.brand{
    font-size:38px;
}

}

</style>

</head>
<body>

<div class="login-box">

    <div class="logo">
        <div class="okvip-logo">
            <span class="ok-icon">👌</span>
            <span class="ok-box">OK</span>
            <span class="vip">VIP</span>
        </div>
    </div>

    <div class="brand">
        TTKM
    </div>

    <div class="badge">
        Hệ thống quản lý khuyến mãi
    </div>

    <div class="input-group">
        <label>Tài khoản</label>
        <input type="text" placeholder="Nhập tên đăng nhập">
    </div>

    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu">
    </div>

    <button>
        ĐĂNG NHẬP
    </button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
