<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #071a38 0%,
        #102d63 50%,
        #2954c8 100%
    );
}

.login-box{
    width:460px;
    background:#ffffff;
    border-radius:30px;
    padding:40px;
    box-shadow:
        0 25px 60px rgba(0,0,0,.25);
}

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.logo img{
    width:230px;
    height:auto;
}

.brand{
    text-align:center;
    font-size:52px;
    font-weight:900;
    letter-spacing:8px;
    color:#0f172a;
    margin-bottom:20px;
    text-transform:uppercase;
}

.badge{
    display:block;
    width:max-content;
    margin:auto;
    background:#dbeafe;
    color:#0369a1;
    padding:12px 22px;
    border-radius:999px;
    font-weight:600;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:17px;
    font-weight:700;
}

.input-box{
    margin-bottom:22px;
}

input{
    width:100%;
    padding:16px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(
        90deg,
        #2563eb,
        #00c8ff
    );
    color:#fff;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:
        0 10px 25px rgba(37,99,235,.35);
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
}

@media(max-width:500px){

.login-box{
    width:92%;
    padding:30px;
}

.brand{
    font-size:38px;
}

.logo img{
    width:180px;
}

}
</style>

</head>
<body>

<div class="login-box">

    <div class="logo">
        <img src="logo-okvip.png" alt="OKVIP">
    </div>

    <div class="brand">
        TTKM
    </div>

    <div class="badge">
        Hệ thống quản lý khuyến mãi
    </div>

    <div class="input-box">
        <label>Tài khoản</label>
        <input type="text" placeholder="Nhập tên đăng nhập">
    </div>

    <div class="input-box">
        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu">
    </div>

    <button>
        ĐĂNG NHẬP
    </button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
