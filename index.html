<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NapGame247</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
}

header{
background:linear-gradient(90deg,#6a11cb,#ff3c8d);
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
font-weight:bold;
font-size:22px;
}

.menu{
display:flex;
gap:30px;
font-size:16px;
}

.hero{
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://naplau.com/master-images/slider/slider1.jpg');

background-size:cover;
background-position:center;
padding:140px 20px;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

.hero h1{
font-size:90px;
font-weight:900;
letter-spacing:3px;

background:linear-gradient(
180deg,
#fff8d6 0%,
#ffe600 30%,
#ffb300 65%,
#ff5722 100%
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 4px 0 #ff6f00,
0 8px 15px rgba(0,0,0,.45),
0 0 30px rgba(255,193,7,.8);
}

.hero p{
margin-top:20px;
font-size:32px;
font-weight:bold;
text-shadow:0 4px 10px rgba(0,0,0,.7);
}

.games{
max-width:1200px;
margin:auto;
padding:50px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.15);
transition:.3s;
text-decoration:none;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.card h2{
padding:30px;
font-size:52px;
text-align:center;
}

.ff{
color:#ff5a1f;
}

.lq{
color:#2f80ed;
}

.telegram{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:15px 20px;
border-radius:20px;
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
box-shadow:0 5px 20px rgba(0,0,0,.2);
font-weight:bold;
color:#222;
z-index:999;
}

.telegram img{
width:40px;
}

footer{
background:#7b1fa2;
color:white;
text-align:center;
padding:30px;
font-size:20px;
margin-top:40px;
}

@media(max-width:768px){

.hero h1{
font-size:45px;
}

.hero p{
font-size:22px;
}

.card h2{
font-size:40px;
}

}

</style>
</head>

<body>

<header>
<div>NAPGAME247</div>

<div class="menu">
<div>HƯỚNG DẪN</div>
<div>KHUYẾN MÃI</div>
<div>BẢO HÀNH</div>
<div>CSKH 24/7</div>
</div>
</header>

<div class="hero">
<h1>SHOP NẠP GAME GIÁ RẺ</h1>
<p>⚡ Nhanh chóng • Uy tín • Hỗ trợ 24/7 ⚡</p>
</div>

<div class="games">

<a class="card" href="/ff.html">

<img src="https://naplau.com/master-images/game/logo_ff.png">

<h2 class="ff">Free Fire</h2>

</a>

<a class="card" href="/lq.html">

<img src="https://naplau.com/master-images/game/logo_lienquan.png">

<h2 class="lq">Liên Quân Mobile</h2>

</a>

</div>

<a class="telegram" href="https://t.me/ketamin28386" target="_blank">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">

<div>
Hỗ trợ Telegram<br>
@ketamin28386
</div>

</a>

<footer>
Copyright © 2026 NapGame247
</footer>

</body>
</html>
