<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NapGame247</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#7b1fa2;
padding:20px;
color:white;
text-align:center;
font-size:35px;
font-weight:bold;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.games{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.game{
background:white;
padding:20px;
border-radius:20px;
width:250px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.game:hover{
transform:scale(1.05);
}

.game img{
width:150px;
border-radius:20px;
}

.hidden{
display:none;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
border:none;
background:#ff5722;
color:white;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

.packages{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.package{
background:white;
padding:20px;
border-radius:15px;
width:200px;
text-align:center;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.package:hover{
background:#ffe0b2;
}

.qr{
margin-top:30px;
background:white;
padding:20px;
border-radius:20px;
}

</style>
</head>

<body>

<header>NAPGAME247</header>

<div class="container">

<div id="home">
<h1>CHỌN GAME NẠP</h1>

<div class="games">

<div class="game" onclick="openGame('ff')">
<img src="https://i.imgur.com/Y8D7G9A.png">
<h2>Free Fire</h2>
</div>

<div class="game" onclick="openGame('lq')">
<img src="https://i.imgur.com/z8l2D3B.png">
<h2>Liên Quân Mobile</h2>
</div>

</div>
</div>

<div id="gamePage" class="hidden">

<button onclick="goHome()">← Quay lại</button>

<h1 id="title"></h1>

<input type="text" id="gameId" placeholder="Nhập ID game">

<button onclick="loginGame()">Đăng nhập</button>

<div id="packages" class="packages hidden"></div>

<div id="payment" class="qr hidden">
<h2>Thanh toán QR</h2>

<p><b>Ngân hàng:</b> VIB</p>
<p><b>STK:</b> 090958147</p>
<p><b>Chủ tài khoản:</b> CAM MINH SON</p>

<p><b>Nội dung:</b> <span id="randomCode"></span></p>

<img id="qrImg" width="300">

</div>

</div>

</div>

<script>

let currentGame = "";

const ffPackages = [
["50.000đ","14.150"],
["100.000đ","28.300"],
["200.000đ","56.600"],
["500.000đ","169.800"]
];

const lqPackages = [
["50.000đ","1.100"],
["100.000đ","2.600"],
["200.000đ","6.000"],
["500.000đ","20.000"]
];

function openGame(game){
currentGame = game;

document.getElementById("home").classList.add("hidden");
document.getElementById("gamePage").classList.remove("hidden");

document.getElementById("packages").classList.add("hidden");
document.getElementById("payment").classList.add("hidden");

if(game=="ff"){
document.getElementById("title").innerHTML="NẠP KIM CƯƠNG FREE FIRE";
}else{
document.getElementById("title").innerHTML="NẠP QUÂN HUY LIÊN QUÂN";
}
}

function goHome(){
document.getElementById("home").classList.remove("hidden");
document.getElementById("gamePage").classList.add("hidden");
}

function loginGame(){

let id = document.getElementById("gameId").value;

if(id==""){
alert("Vui lòng nhập ID");
return;
}

alert("Đăng nhập thành công");

let packages = document.getElementById("packages");

packages.innerHTML="";
packages.classList.remove("hidden");

let data = currentGame=="ff" ? ffPackages : lqPackages;

data.forEach(p=>{

packages.innerHTML += `
<div class="package" onclick="pay('${p[0]}')">
<h2>${p[0]}</h2>
<h3>${p[1]} ${currentGame=="ff" ? "💎" : "🎫"}</h3>
</div>
`;

});

}

function pay(amount){

let code = "NAP" + Math.floor(Math.random()*999999);

document.getElementById("randomCode").innerHTML = code;

let qr =
`https://img.vietqr.io/image/VIB-090958147-compact2.png?amount=${amount.replace(/\D/g,'')}&addInfo=${code}&accountName=CAM%20MINH%20SON`;

document.getElementById("qrImg").src = qr;

document.getElementById("payment").classList.remove("hidden");

}

</script>

</body>
</html>
