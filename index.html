<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #081224 0%,
        #13284c 50%,
        #2f58b8 100%
    );
}

.login-box{
    width:430px;
    background:#fff;
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
    width:110px;
    height:110px;
    margin:0 auto 15px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

h1{
    text-align:center;
    color:#0f172a;
    font-size:42px;
    font-weight:800;
    margin-bottom:15px;
}

.badge{
    display:block;
    width:max-content;
    margin:auto;
    padding:10px 18px;
    border-radius:30px;
    background:#dbeafe;
    color:#0369a1;
    font-weight:600;
    margin-bottom:30px;
}

.label{
    display:block;
    font-weight:600;
    color:#334155;
    margin-bottom:8px;
}

.input{
    width:100%;
    padding:15px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    margin-bottom:20px;
    font-size:15px;
    transition:.3s;
}

.input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

.btn{
    width:100%;
    border:none;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:700;
    color:white;
    cursor:pointer;
    background:linear-gradient(
        90deg,
        #2563eb,
        #06b6d4
    );
}

.btn:hover{
    opacity:.95;
}

.footer{
    text-align:center;
    color:#64748b;
    font-size:13px;
    margin-top:25px;
}

@media(max-width:500px){
    .login-box{
        width:92%;
        padding:30px;
    }

    h1{
        font-size:34px;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <img src="data:image/png;base64,YOUR_BASE64_LOGO_HERE">
    </div>

    <h1>TTKM OKVIP</h1>

    <span class="badge">
        Hệ thống quản lý khuyến mãi
    </span>

    <label class="label">
        Tài khoản
    </label>

    <input
        class="input"
        type="text"
        placeholder="Nhập tên đăng nhập"
    >

    <label class="label">
        Mật khẩu
    </label>

    <input
        class="input"
        type="password"
        placeholder="Nhập mật khẩu"
    >

    <button class="btn">
        ĐĂNG NHẬP
    </button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
