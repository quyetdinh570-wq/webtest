<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #081224 0%,
    #112a52 50%,
    #2954c8 100%);
}

.login-box{
    width:440px;

    background:#fff;

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.25);
}

/* LOGO */

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.logo-inner{
    width:120px;
    height:120px;

    border-radius:50%;

    background:
    radial-gradient(
    circle at top,
    #67e8f9,
    #2563eb 55%,
    #0f172a);

    display:flex;
    justify-content:center;
    align-items:center;

    border:4px solid rgba(255,255,255,.4);

    box-shadow:
    0 0 25px rgba(37,99,235,.6),
    0 10px 30px rgba(0,0,0,.2);
}

.logo-inner span{
    color:#fff;
    font-size:42px;
    font-weight:900;
    letter-spacing:3px;
}

/* TÊN */

.brand{
    text-align:center;

    font-size:52px;
    font-weight:900;

    letter-spacing:4px;

    margin-bottom:18px;

    text-transform:uppercase;
}

.brand .ttkm{
    color:#0f172a;
}

.brand .okvip{
    background:
    linear-gradient(
    90deg,
    #2563eb,
    #00d4ff,
    #2563eb);

    background-size:200% auto;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 4s linear infinite;
}

@keyframes shine{
    from{
        background-position:0% center;
    }
    to{
        background-position:200% center;
    }
}

.badge{
    width:max-content;

    margin:auto;

    background:#dbeafe;

    color:#0369a1;

    padding:10px 18px;

    border-radius:999px;

    font-weight:600;

    margin-bottom:30px;
}

label{
    display:block;

    margin-bottom:8px;

    color:#334155;

    font-weight:700;
}

input{
    width:100%;

    padding:15px;

    border:1px solid #cbd5e1;

    border-radius:12px;

    font-size:15px;

    margin-bottom:20px;

    transition:.3s;
}

input:focus{
    outline:none;

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,.15);
}

button{
    width:100%;

    padding:16px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #00c8ff);

    color:white;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(37,99,235,.35);
}

.footer{
    margin-top:25px;

    text-align:center;

    color:#64748b;

    font-size:13px;
}

@media(max-width:500px){

.login-box{
    width:92%;
    padding:30px;
}

.brand{
    font-size:38px;
}

.logo-inner{
    width:100px;
    height:100px;
}

}

</style>

</head>
<body>

<div class="login-box">

    <div class="logo">
        <div class="logo-inner">
            <span>TT</span>
        </div>
    </div>

    <div class="brand">
        <span class="ttkm">TTKM</span>
        <span class="okvip">OKVIP</span>
    </div>

    <div class="badge">
        Hệ thống quản lý khuyến mãi
    </div>

    <label>Tài khoản</label>
    <input type="text" placeholder="Nhập tên đăng nhập">

    <label>Mật khẩu</label>
    <input type="password" placeholder="Nhập mật khẩu">

    <button>ĐĂNG NHẬP</button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
