<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAPGAME247</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0615;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:90%;
max-width:700px;
padding:40px;
border-radius:25px;
background:#151025;
border:1px solid #7c3aed;
box-shadow:0 0 30px rgba(124,58,237,.5);
text-align:center;
}

h1{
font-size:48px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:15px;
font-size:18px;
}

button{
padding:15px 25px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:linear-gradient(90deg,#7c3aed,#ff6600);
color:white;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="box">
<h1>NAPGAME247</h1>
<p>Demo giao diện hoạt động</p>

<input placeholder="Nhập ID game">

<button onclick="alert('Website đang hoạt động!')">
ĐĂNG NHẬP
</button>
</div>

</body>
</html>
