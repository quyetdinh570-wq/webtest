<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website của tôi</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background:#f4f4f4;
            margin:0;
        }
        header{
            background:#007bff;
            color:white;
            padding:20px;
        }
        .box{
            margin:50px auto;
            max-width:600px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Chào mừng đến website của tôi</h1>
    </header>

    <div class="box">
        <h2>Xin chào!</h2>
        <p>Đây là website đầu tiên của tôi.</p>
        <button onclick="alert('Cảm ơn bạn đã ghé thăm!')">
            Nhấn vào đây
        </button>
    </div>
</body>
</html>
