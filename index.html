<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,#0f3fff 0%,#03142e 70%);
overflow:hidden;
}

/* nền công nghệ */

body::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(rgba(0,150,255,.08) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,150,255,.08) 1px,transparent 1px);
background-size:40px 40px;
}

/* box */

.login-box{
position:relative;
z-index:2;

width:460px;

background:
rgba(5,15,40,.92);

border:1px solid rgba(0,180,255,.5);

border-radius:30px;

padding:40px;

backdrop-filter:blur(15px);

box-shadow:
0 0 30px rgba(0,140,255,.25);
}

/* logo */

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:220px;
max-width:100%;
}

/* ttkm */

.ttkm{
text-align:center;
color:white;
font-size:28px;
font-weight:700;
letter-spacing:10px;
margin-bottom:20px;
opacity:.95;
}

.badge{
display:flex;
justify-content:center;
align-items:center;
gap:8px;

padding:12px;

border:1px solid rgba(0,170,255,.4);

border-radius:14px;

color:#3bc7ff;

margin-bottom:25px;
}

/* input */

label{
display:block;
color:white;
margin-bottom:8px;
font-size:15px;
font-weight:600;
}

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid rgba(0,150,255,.35);
background:rgba(0,0,0,.25);
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#00bfff;
box-shadow:0 0 15px rgba(0,191,255,.3);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;

background:
linear-gradient(
90deg,
#0ea5ff,
#1d4fff);

color:white;

font-size:22px;
font-weight:800;

cursor:pointer;

margin-top:10px;
}

button:hover{
filter:brightness(1.1);
}

.footer{
text-align:center;
margin-top:20px;
color:#9db7d8;
font-size:13px;
}

/* trạng thái */

.status{

margin-top:18px;

padding:12px;

border-radius:12px;

text-align:center;

color:#44ff88;

border:1px solid rgba(68,255,136,.4);

display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#44ff88;
box-shadow:0 0 10px #44ff88;
}

/* success */

.success{
display:none;
text-align:center;
padding:20px;
}

.check{

width:100px;
height:100px;

margin:0 auto 15px;

border-radius:50%;

background:#22c55e;

display:flex;
justify-content:center;
align-items:center;

font-size:55px;
font-weight:bold;
color:white;

box-shadow:
0 0 30px rgba(34,197,94,.5);
}

.success h2{
color:#22c55e;
}

</style>
</head>

<body>

<div class="login-box">

<div id="loginForm">

<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/OK_symbol.svg/512px-OK_symbol.svg.png">
</div>

<div class="ttkm">
T T K M
</div>

<div class="badge">
🛡 Hệ thống quản lý khuyến mãi
</div>

<div class="input-group">
<label>TÀI KHOẢN</label>
<input type="text" placeholder="Nhập tên đăng nhập">
</div>

<div class="input-group">
<label>MẬT KHẨU</label>
<input type="password" placeholder="Nhập mật khẩu">
</div>

<button onclick="login()">
ĐĂNG NHẬP
</button>

<div class="footer">
© 2026 TTKM OKVIP
</div>

<div class="status">
<div class="dot"></div>
Mã Lệnh Đang Được Hỗ Trợ Nha
</div>

</div>

<div id="success" class="success">

<div class="check">
✓
</div>

<h2>Đăng nhập thành công</h2>

</div>

</div>

<script>

function login(){

document.getElementById("loginForm").style.display="none";

document.getElementById("success").style.display="block";

}

</script>

</body>
</html>
