<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #081a3a,
    #12367a,
    #2e5fff);
}

.login-box{
    width:460px;
    background:#fff;
    border-radius:32px;
    padding:45px;
    box-shadow:
    0 25px 60px rgba(0,0,0,.25);
}

/* LOGO */

.logo-wrap{
    text-align:center;
    margin-bottom:25px;
}

.logo-circle{
    width:120px;
    height:120px;
    margin:0 auto 20px;

    border-radius:50%;

    background:
    linear-gradient(
    145deg,
    #00c8ff,
    #2563eb,
    #0f172a);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 15px 35px rgba(37,99,235,.4),
    inset 0 3px 12px rgba(255,255,255,.35);
}

.logo-circle span{
    color:white;
    font-size:42px;
    font-weight:900;
    letter-spacing:3px;
}

/* BRAND */

.brand{
    text-align:center;
    line-height:1;
}

.brand-top{
    font-size:54px;
    font-weight:900;
    letter-spacing:8px;
    color:#0f172a;
}

.brand-bottom{

    margin-top:8px;

    font-size:58px;
    font-weight:900;

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #00d4ff,
    #2563eb);

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 6s linear infinite;
}

@keyframes shine{

0%{
background-position:0%;
}

100%{
background-position:300%;
}

}

.badge{

    width:max-content;

    margin:25px auto 35px;

    background:#dbeafe;

    color:#0369a1;

    padding:12px 22px;

    border-radius:999px;

    font-weight:700;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:16px;
    font-weight:700;
}

input{
    width:100%;
    padding:16px;

    border:1px solid #cbd5e1;

    border-radius:12px;

    font-size:15px;

    transition:.3s;
}

input:focus{

    outline:none;

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,.15);

}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    color:white;

    font-size:18px;

    font-weight:900;

    cursor:pointer;

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #00c8ff);

    transition:.3s;

}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(37,99,235,.35);

}

.footer{

    margin-top:25px;

    text-align:center;

    color:#64748b;

    font-size:13px;

}

@media(max-width:500px){

.login-box{
    width:92%;
    padding:30px;
}

.brand-top{
    font-size:42px;
}

.brand-bottom{
    font-size:46px;
}

.logo-circle{
    width:100px;
    height:100px;
}

}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo-wrap">

        <div class="logo-circle">
            <span>TT</span>
        </div>

        <div class="brand">
            <div class="brand-top">TTKM</div>
            <div class="brand-bottom">OKVIP</div>
        </div>

    </div>

    <div class="badge">
        Hệ thống quản lý khuyến mãi
    </div>

    <div class="input-group">
        <label>Tài khoản</label>
        <input type="text" placeholder="Nhập tên đăng nhập">
    </div>

    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu">
    </div>

    <button>ĐĂNG NHẬP</button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
