<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTKM OKVIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #06142b 0%,
        #10284d 50%,
        #2954c8 100%
    );
}

.container{
    width:430px;
    background:#fff;
    border-radius:30px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,.25);
}

.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 25px rgba(37,99,235,.35);
}

.logo span{
    color:white;
    font-size:32px;
    font-weight:900;
    letter-spacing:2px;
}

.brand{
    text-align:center;
    margin-top:20px;
    margin-bottom:15px;
    font-size:46px;
    font-weight:900;
    letter-spacing:2px;
    text-transform:uppercase;
}

.brand .ttkm{
    color:#0f172a;
}

.brand .okvip{
    background:linear-gradient(
        90deg,
        #2563eb,
        #06b6d4
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.badge{
    display:block;
    width:max-content;
    margin:auto;
    padding:10px 18px;
    border-radius:30px;
    background:#dbeafe;
    color:#0369a1;
    font-weight:600;
    margin-bottom:30px;
}

label{
    display:block;
    font-weight:700;
    margin-bottom:8px;
    color:#334155;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
    margin-bottom:20px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        90deg,
        #2563eb,
        #06b6d4
    );
    color:white;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#64748b;
    font-size:13px;
}

@media(max-width:500px){
    .container{
        width:92%;
        padding:30px;
    }

    .brand{
        font-size:36px;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="logo">
        <span>OK</span>
    </div>

    <div class="brand">
        <span class="ttkm">TTKM</span>
        <span class="okvip">OKVIP</span>
    </div>

    <div class="badge">
        Hệ thống quản lý khuyến mãi
    </div>

    <label>Tài khoản</label>
    <input type="text" placeholder="Nhập tên đăng nhập">

    <label>Mật khẩu</label>
    <input type="password" placeholder="Nhập mật khẩu">

    <button>ĐĂNG NHẬP</button>

    <div class="footer">
        © 2026 TTKM OKVIP<br>
        Hệ thống quản lý khuyến mãi
    </div>

</div>

</body>
</html>
