<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NapGame247</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f3f3;
}

header{
background:#7b1fa2;
padding:20px;
color:white;
font-size:35px;
font-weight:bold;
text-align:center;
}

.banner{
background:linear-gradient(90deg,#7b1fa2,#ff4081);
padding:60px 20px;
text-align:center;
color:white;
}

.banner h1{
font-size:55px;
margin-bottom:20px;
}

.banner p{
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.games{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.game-card{
background:white;
width:320px;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.game-card:hover{
transform:translateY(-10px) scale(1.03);
}

.game-card img{
width:100%;
height:220px;
object-fit:cover;
}

.game-card h2{
padding:20px;
text-align:center;
font-size:35px;
}

.hidden{
display:none;
}

.page{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.title{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ccc;
font-size:18px;
margin-top:20px;
}

.btn{
background:#ff5722;
color:white;
border:none;
padding:15px 30px;
border-radius:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
background:#e64a19;
}

.packages{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.package{
background:#fafafa;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
}

.package:hover{
background:#ffe0b2;
transform:scale(1.03);
}

.package h3{
font-size:30px;
margin-bottom:15px;
}

.amount{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:28px;
font-weight:bold;
color:#00bcd4;
}

.amount img{
width:28px;
height:28px;
}

.payment{
margin-top:40px;
padding:30px;
background:#fafafa;
border-radius:25px;
text-align:center;
}

.payment img{
margin-top:20px;
border-radius:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.info{
margin-top:20px;
font-size:20px;
line-height:40px;
font-weight:bold;
}

.back{
background:black;
}

footer{
margin-top:50px;
background:#7b1fa2;
color:white;
text-align:center;
padding:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>NAPGAME247</header>

<div class="banner">
<h1>SHOP NẠP GAME GIÁ RẺ</h1>
<p>Nhanh chóng • Uy tín • Hỗ trợ 24/7</p>
</div>

<div class="container">

<div id="home">
<div class="games">

<div class="game-card" onclick="openGame('ff')">
<img src="/master-images/game/logo_ff.png">
<h2 style="color:#ff5722;">Free Fire</h2>
</div>

<div class="game-card" onclick="openGame('lq')">
<img src="/master-images/game/logo_lienquan.png">
<h2 style="color:#2196f3;">Liên Quân Mobile</h2>
</div>

</div>
</div>

<div id="gamePage" class="hidden">
<div class="page">

<button class="btn back" onclick="goHome()">← Quay lại</button>

<h1 class="title" id="gameTitle"></h1>

<input type="text" id="gameId" placeholder="Vui lòng nhập ID game">

<button class="btn" onclick="loginGame()">ĐĂNG NHẬP</button>

<div id="packages" class="packages hidden"></div>

<div id="payment" class="payment hidden">
<h2 style="font-size:35px;">THANH TOÁN QR</h2>

<img id="qrImage" width="300">

<div class="info">
<div>Ngân hàng: VIB</div>
<div>Số tài khoản: 090958147</div>
<div>Chủ tài khoản: CAM MINH SON</div>
<div>Nội dung CK: <span id="transferCode"></span></div>
</div>
</div>

</div>
</div>

</div>

<footer>
Copyright © 2026 NapGame247
</footer>

<script>

let currentGame = "";

const ffPackages = [
{price:'50000',label:'50.000đ',amount:'14.150'},
{price:'100000',label:'100.000đ',amount:'28.300'},
{price:'200000',label:'200.000đ',amount:'56.600'},
{price:'500000',label:'500.000đ',amount:'169.800'}
];

const lqPackages = [
{price:'50000',label:'50.000đ',amount:'1.100'},
{price:'100000',label:'100.000đ',amount:'2.600'},
{price:'200000',label:'200.000đ',amount:'6.000'},
{price:'500000',label:'500.000đ',amount:'20.000'}
];

function openGame(game){
currentGame = game;

document.getElementById('home').classList.add('hidden');
document.getElementById('gamePage').classList.remove('hidden');

document.getElementById('packages').classList.add('hidden');
document.getElementById('payment').classList.add('hidden');

document.getElementById('gameId').value='';

if(game==='ff'){
document.getElementById('gameTitle').innerHTML='NẠP KIM CƯƠNG FREE FIRE';
}else{
document.getElementById('gameTitle').innerHTML='NẠP QUÂN HUY LIÊN QUÂN';
}
}

function goHome(){
document.getElementById('home').classList.remove('hidden');
document.getElementById('gamePage').classList.add('hidden');
}

function loginGame(){

const id = document.getElementById('gameId').value;

if(id===''){
alert('Vui lòng nhập ID game');
return;
}

alert('Đăng nhập thành công');

const packagesDiv = document.getElementById('packages');
packagesDiv.innerHTML='';
packagesDiv.classList.remove('hidden');

const data = currentGame==='ff' ? ffPackages : lqPackages;

const icon = currentGame==='ff'
? 'https://cdn-gop.garenanow.com/gop/app/0000/100/067/point.png'
: 'https://cdn-gop.garenanow.com/gop/app/0000/100/054/point.png';

for(let item of data){

packagesDiv.innerHTML += `
<div class="package" onclick="createPayment('${item.price}')">
<h3>${item.label}</h3>

<div class="amount">
<img src="${icon}">
${item.amount}
</div>

<button class="btn">NẠP NGAY</button>
</div>
`;

}

}

function createPayment(amount){

const randomCode = 'NAP' + Math.floor(Math.random()*999999);

document.getElementById('transferCode').innerHTML = randomCode;

const qrLink = `https://img.vietqr.io/image/VIB-090958147-compact2.png?amount=${amount}&addInfo=${randomCode}&accountName=CAM%20MINH%20SON`;

document.getElementById('qrImage').src = qrLink;

document.getElementById('payment').classList.remove('hidden');

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}

</script>

</body>
</html>
